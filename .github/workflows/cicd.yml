name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

- name: Run tests
  run: |
    pip install pytest
    pytest


      - name: Run test
        run: python -m py_compile app.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.Chukwuka1980 }}
          password: ${{ secrets.DOCKER access token }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-devops-app:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cicd-devops-app:latest
